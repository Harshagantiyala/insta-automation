# Render.yaml deployment blueprint
databases:
  - name: instaflow-db
    plan: free

envVarGroups:
  - name: instaflow-shared-secrets
    envVars:
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

services:

  # -----------------------------------------------------
  # 1. CACHE & MESSAGE QUEUE (Redis)
  # -----------------------------------------------------
  - type: redis
    name: instaflow-redis
    plan: free
    ipAllowList: [] # Internal access only

  # -----------------------------------------------------
  # 2. BACKEND API SERVICE (Embeds Background Workers in Prod)
  # -----------------------------------------------------
  - type: web
    name: instaflow-api
    plan: free
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: instaflow/backend
    envVars:
      - fromGroup: instaflow-shared-secrets
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: instaflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: instaflow-redis
          property: connectionString
      # --- REQUIRED SECRETS (You must fill these out in the Render Dashboard!) ---
      - key: FRONTEND_URL
        value: https://instaflow.onrender.com # Placeholder, update after frontend deploys
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_OAUTH_REDIRECT_URI
        value: https://instaflow.onrender.com/connect # Update if your frontend URL changes
      - key: META_WEBHOOK_VERIFY_TOKEN
        generateValue: true

  # -----------------------------------------------------
  # 3. FRONTEND STATIC SITE
  # -----------------------------------------------------
  - type: web
    name: instaflow-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: instaflow/frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: instaflow-api
          envVarKey: RENDER_EXTERNAL_URL
